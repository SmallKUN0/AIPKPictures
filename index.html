<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI作品阅览</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }

/* 主界面 */
#mainScreen {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #90EE90 0%, #7FCD7F 50%, #6EB86E 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    padding-top: 15vh; position: relative; z-index: 1;
}

.glow-text {
    color: #fff; font-size: 22px; font-weight: bold;
    text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.6), 0 0 40px rgba(255,255,255,0.4);
    text-align: center; padding: 0 20px; margin-bottom: 60px; letter-spacing: 2px;
    animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
    0%, 100% { opacity: 0.85; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.02); }
}

.btn {
    background: transparent; color: #fff; font-size: 18px; font-weight: bold;
    border: 2px solid #fff; border-radius: 30px; padding: 14px 50px;
    cursor: pointer; transition: all 0.3s ease; letter-spacing: 3px;
    box-shadow: 0 0 15px rgba(255,255,255,0.3); margin: 12px 0;
    backdrop-filter: blur(4px);
}
.btn:hover { background: rgba(255,255,255,0.15); box-shadow: 0 0 25px rgba(255,255,255,0.6); transform: translateY(-2px); }
.btn:active { transform: translateY(0) scale(0.97); }

/* 选项列表遮罩 */
#optionOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
    display: none; align-items: center; justify-content: center; z-index: 200;
    opacity: 0; transition: opacity 0.3s ease;
}
#optionOverlay.show { display: flex; opacity: 1; }

.option-panel {
    background: rgba(30,60,30,0.95); border: 2px solid rgba(255,255,255,0.3);
    border-radius: 20px; padding: 25px; width: 320px; max-height: 70vh;
    overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    transform: scale(0.9); transition: transform 0.3s ease;
}
#optionOverlay.show .option-panel { transform: scale(1); }

.option-panel h3 { color: #fff; text-align: center; margin-bottom: 20px; font-size: 18px; letter-spacing: 2px; }

.option-item {
    display: block; width: 100%; padding: 14px; margin: 8px 0;
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 12px; color: #fff; font-size: 15px; text-align: center;
    cursor: pointer; transition: all 0.2s ease; letter-spacing: 1px;
}
.option-item:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); transform: translateX(5px); }
.option-item:active { transform: scale(0.98); }

.option-close {
    display: block; width: 100%; padding: 12px; margin-top: 15px;
    background: rgba(255,80,80,0.3); border: 1px solid rgba(255,100,100,0.5);
    border-radius: 12px; color: #ffaaaa; font-size: 15px; text-align: center;
    cursor: pointer; transition: all 0.2s ease;
}
.option-close:hover { background: rgba(255,80,80,0.5); }

/* 内容iframe */
#contentFrame {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    border: none; display: none; z-index: 10; background: #fff;
}

/* 悬浮球 */
#floatBall {
    position: fixed; width: 60px; height: 60px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.6);
    backdrop-filter: blur(10px); box-shadow: 0 4px 20px rgba(0,0,0,0.3), 0 0 15px rgba(255,255,255,0.2);
    display: none; align-items: center; justify-content: center; z-index: 100;
    cursor: pointer; user-select: none; touch-action: none;
    transition: transform 0.1s ease, box-shadow 0.3s ease;
    right: 20px; bottom: 100px;
}
#floatBall::before {
    content: ""; width: 20px; height: 20px; border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, rgba(255,255,255,0.3) 100%);
    box-shadow: 0 0 10px rgba(255,255,255,0.8);
    animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
}
#floatBall.dragging { transition: none; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
#floatBall .ball-label {
    position: absolute; bottom: -22px; left: 50%; transform: translateX(-50%);
    color: #fff; font-size: 11px; white-space: nowrap; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    pointer-events: none;
}

/* 退出确认弹窗 */
#exitModal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
    display: none; align-items: center; justify-content: center; z-index: 300;
    opacity: 0; transition: opacity 0.3s ease;
}
#exitModal.show { display: flex; opacity: 1; }

.exit-box {
    background: rgba(20,50,20,0.95); border: 2px solid rgba(255,255,255,0.3);
    border-radius: 20px; padding: 35px 40px; text-align: center;
    box-shadow: 0 15px 50px rgba(0,0,0,0.5); transform: scale(0.9); transition: transform 0.3s ease;
    max-width: 320px; width: 90%;
}
#exitModal.show .exit-box { transform: scale(1); }

.exit-box p { color: #fff; font-size: 18px; margin-bottom: 28px; line-height: 1.6; }

.exit-btns { display: flex; gap: 15px; justify-content: center; }

.exit-btn {
    padding: 12px 30px; border-radius: 25px; font-size: 16px; font-weight: bold;
    cursor: pointer; border: 2px solid; transition: all 0.2s ease; letter-spacing: 2px;
}
.exit-btn-yes { background: rgba(255,80,80,0.2); color: #ff9999; border-color: rgba(255,100,100,0.5); }
.exit-btn-yes:hover { background: rgba(255,80,80,0.4); }
.exit-btn-no { background: rgba(100,200,100,0.2); color: #aaffaa; border-color: rgba(100,200,100,0.5); }
.exit-btn-no:hover { background: rgba(100,200,100,0.4); }

/* 图片查看器 */
#imageViewer {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(10,20,10,0.95); display: none; z-index: 400;
    flex-direction: column; overflow: hidden;
}
#imageViewer.show { display: flex; }

.viewer-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 15px 20px; background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
}
.viewer-header h3 { color: #fff; font-size: 17px; letter-spacing: 2px; }
.viewer-close {
    background: rgba(255,80,80,0.3); color: #ffaaaa; border: 1px solid rgba(255,100,100,0.5);
    border-radius: 20px; padding: 8px 22px; font-size: 14px; cursor: pointer; transition: all 0.2s ease;
}
.viewer-close:hover { background: rgba(255,80,80,0.5); }

.viewer-body {
    flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch;
}

.img-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; margin-bottom: 20px; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; padding: 15px;
    transition: transform 0.2s ease;
}
.img-card:hover { transform: translateY(-3px); }

.img-card img {
    max-width: 100%; max-height: 60vh; border-radius: 10px;
    display: block; object-fit: contain;
}
.img-card .img-name {
    color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 10px; letter-spacing: 1px;
}

.img-placeholder {
    width: 100%; height: 200px; display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.3); font-size: 14px; border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 10px;
}

/* 滚动条美化 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
</style>
</head>
<body>

<!-- 主界面 -->
<div id="mainScreen">
    <div class="glow-text">选择你看好了AI作品<br>点击下方按钮即可阅览</div>
    <button class="btn" id="btnSelect">选择阅览</button>
    <button class="btn" id="btnImages">查看聊天图片</button>
</div>

<!-- 选项列表 -->
<div id="optionOverlay">
    <div class="option-panel">
        <h3>选择要阅览的文件</h3>
        <div class="option-item" data-file="Kimi2D.html">Kimi2D.html</div>
        <div class="option-item" data-file="Kimi3D.html">Kimi3D.html</div>
        <div class="option-item" data-file="Deepseek2D.html">Deepseek2D.html</div>
        <div class="option-item" data-file="DeepSeek3D.html">DeepSeek3D.html</div>
        <div class="option-item" data-file="YuanBao2D.html">YuanBao2D.html</div>
        <div class="option-item" data-file="YuanBao3D.html">YuanBao3D.html</div>
        <div class="option-item" data-file="DoBao.html">DoBao.html</div>
        <div class="option-item" data-file="DoBao.html">DoBao.html</div>
        <div class="option-close" id="btnCloseOptions">取消</div>
    </div>
</div>

<!-- 内容iframe -->
<iframe id="contentFrame"></iframe>

<!-- 悬浮球 -->
<div id="floatBall">
    <span class="ball-label">点击退出</span>
</div>

<!-- 退出确认弹窗 -->
<div id="exitModal">
    <div class="exit-box">
        <p>确定要退出当前阅览<br>返回主界面吗？</p>
        <div class="exit-btns">
            <button class="exit-btn exit-btn-yes" id="btnExitYes">退出</button>
            <button class="exit-btn exit-btn-no" id="btnExitNo">取消</button>
        </div>
    </div>
</div>

<!-- 图片查看器 -->
<div id="imageViewer">
    <div class="viewer-header">
        <h3>聊天图片</h3>
        <button class="viewer-close" id="btnViewerClose">退出</button>
    </div>
    <div class="viewer-body" id="viewerBody"></div>
</div>

<script>
(function() {
    // 元素引用
    const mainScreen = document.getElementById('mainScreen');
    const optionOverlay = document.getElementById('optionOverlay');
    const contentFrame = document.getElementById('contentFrame');
    const floatBall = document.getElementById('floatBall');
    const exitModal = document.getElementById('exitModal');
    const imageViewer = document.getElementById('imageViewer');
    const viewerBody = document.getElementById('viewerBody');

    const btnSelect = document.getElementById('btnSelect');
    const btnImages = document.getElementById('btnImages');
    const btnCloseOptions = document.getElementById('btnCloseOptions');
    const btnExitYes = document.getElementById('btnExitYes');
    const btnExitNo = document.getElementById('btnExitNo');
    const btnViewerClose = document.getElementById('btnViewerClose');

    // ========== 选择阅览 ==========
    btnSelect.addEventListener('click', function() {
        optionOverlay.classList.add('show');
    });

    btnCloseOptions.addEventListener('click', function() {
        optionOverlay.classList.remove('show');
    });

    optionOverlay.addEventListener('click', function(e) {
        if (e.target === optionOverlay) {
            optionOverlay.classList.remove('show');
        }
    });

    // 绑定选项点击
    document.querySelectorAll('.option-item').forEach(function(item) {
        item.addEventListener('click', function() {
            var file = this.getAttribute('data-file');
            optionOverlay.classList.remove('show');
            loadFile(file);
        });
    });

    function loadFile(filename) {
        contentFrame.src = filename;
        contentFrame.style.display = 'block';
        mainScreen.style.display = 'none';
        floatBall.style.display = 'flex';
    }

    // ========== 悬浮球逻辑 ==========
    var pressStartTime = 0;
    var isDragging = false;
    var dragStartX = 0, dragStartY = 0;
    var ballStartX = 0, ballStartY = 0;
    var hasMoved = false;
    var LONG_PRESS_THRESHOLD = 400; // 0.4秒
    var MOVE_THRESHOLD = 5;

    function getPointerPos(e) {
        if (e.touches && e.touches.length > 0) {
            return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        return { x: e.clientX, y: e.clientY };
    }

    function onBallDown(e) {
        e.preventDefault();
        var pos = getPointerPos(e);
        pressStartTime = Date.now();
        isDragging = false;
        hasMoved = false;
        dragStartX = pos.x;
        dragStartY = pos.y;

        var rect = floatBall.getBoundingClientRect();
        ballStartX = rect.left;
        ballStartY = rect.top;

        // 长按检测定时器
        floatBall._longPressTimer = setTimeout(function() {
            isDragging = true;
            floatBall.classList.add('dragging');
        }, LONG_PRESS_THRESHOLD);
    }

    function onBallMove(e) {
        if (!pressStartTime) return;
        var pos = getPointerPos(e);
        var dx = pos.x - dragStartX;
        var dy = pos.y - dragStartY;

        if (Math.abs(dx) > MOVE_THRESHOLD || Math.abs(dy) > MOVE_THRESHOLD) {
            hasMoved = true;
        }

        if (isDragging) {
            e.preventDefault();
            var newX = ballStartX + dx;
            var newY = ballStartY + dy;
            // 边界限制
            var maxX = window.innerWidth - floatBall.offsetWidth;
            var maxY = window.innerHeight - floatBall.offsetHeight;
            newX = Math.max(0, Math.min(newX, maxX));
            newY = Math.max(0, Math.min(newY, maxY));
            floatBall.style.left = newX + 'px';
            floatBall.style.top = newY + 'px';
            floatBall.style.right = 'auto';
            floatBall.style.bottom = 'auto';
        }
    }

    function onBallUp(e) {
        if (floatBall._longPressTimer) {
            clearTimeout(floatBall._longPressTimer);
            floatBall._longPressTimer = null;
        }
        floatBall.classList.remove('dragging');

        var pressDuration = Date.now() - pressStartTime;
        pressStartTime = 0;

        if (isDragging) {
            isDragging = false;
            return; // 拖动结束，不触发点击
        }

        if (hasMoved) return; // 有移动，不触发点击

        if (pressDuration <= LONG_PRESS_THRESHOLD) {
            // 短按：弹出退出确认
            exitModal.classList.add('show');
        }
        // 超过0.4秒但没怎么移动，也不弹窗（视为长按意图）
    }

    floatBall.addEventListener('mousedown', onBallDown);
    document.addEventListener('mousemove', onBallMove);
    document.addEventListener('mouseup', onBallUp);

    floatBall.addEventListener('touchstart', onBallDown, { passive: false });
    document.addEventListener('touchmove', onBallMove, { passive: false });
    document.addEventListener('touchend', onBallUp);

    // 退出确认
    btnExitYes.addEventListener('click', function() {
        exitModal.classList.remove('show');
        contentFrame.src = 'index.html';
        contentFrame.style.display = 'none';
        mainScreen.style.display = 'flex';
        floatBall.style.display = 'none';
        // 重置悬浮球位置
        floatBall.style.left = 'auto';
        floatBall.style.top = 'auto';
        floatBall.style.right = '20px';
        floatBall.style.bottom = '100px';
    });

    btnExitNo.addEventListener('click', function() {
        exitModal.classList.remove('show');
    });

    exitModal.addEventListener('click', function(e) {
        if (e.target === exitModal) {
            exitModal.classList.remove('show');
        }
    });

    // ========== 查看聊天图片 ==========
    btnImages.addEventListener('click', function() {
        viewerBody.innerHTML = '';
        for (var i = 1; i <= 10; i++) {
            var card = document.createElement('div');
            card.className = 'img-card';

            var img = document.createElement('img');
            img.src = i + '.png';
            img.alt = i + '.png';
            img.onerror = function() {
                var ph = document.createElement('div');
                ph.className = 'img-placeholder';
                ph.textContent = i + '.png（图片未找到）';
                card.innerHTML = '';
                card.appendChild(ph);
                var name = document.createElement('div');
                name.className = 'img-name';
                name.textContent = i + '.png';
                card.appendChild(name);
            };

            var name = document.createElement('div');
            name.className = 'img-name';
            name.textContent = i + '.png';

            card.appendChild(img);
            card.appendChild(name);
            viewerBody.appendChild(card);
        }
        imageViewer.classList.add('show');
    });

    btnViewerClose.addEventListener('click', function() {
        imageViewer.classList.remove('show');
    });

})();
</script>
</body>
</html>
