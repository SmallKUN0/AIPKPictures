<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D极速跑酷</title>
    <style>
        :root {
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            height: 100dvh;
            width: 100vw;
            position: fixed;
            top: 0;
            left: 0;
        }

        #game-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        #score-display {
            position: absolute;
            top: max(20px, 5vh);
            left: 50%;
            transform: translateX(-50%);
            color: #ffffff;
            font-size: clamp(28px, 5vw, 48px);
            font-weight: 900;
            letter-spacing: 0.04em;
            text-shadow: 0 0 20px rgba(120, 200, 255, 0.7), 0 0 60px rgba(100, 160, 255, 0.4), 0 4px 8px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            z-index: 20;
            transition: transform 0.15s ease;
        }
        #score-display.pulse {
            transform: translateX(-50%) scale(1.25);
        }

        #combo-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: #ffdd57;
            font-size: clamp(20px, 3.5vw, 32px);
            font-weight: 800;
            pointer-events: none;
            z-index: 21;
            text-shadow: 0 0 30px rgba(255, 220, 80, 0.9);
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
            opacity: 0;
        }
        #combo-text.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        #game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            z-index: 30;
            opacity: 0;
            transition: opacity 0.4s ease;
            visibility: hidden;
        }
        #game-over-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        #game-over-overlay h2 {
            color: #ff4757;
            font-size: clamp(36px, 7vw, 56px);
            font-weight: 900;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(255, 70, 85, 0.7);
            letter-spacing: 0.03em;
        }
        #game-over-overlay .final-score {
            color: #ffffff;
            font-size: clamp(18px, 3vw, 26px);
            margin-bottom: 6px;
            font-weight: 600;
        }
        #game-over-overlay .best-score {
            color: #ffdd57;
            font-size: clamp(15px, 2.5vw, 20px);
            margin-bottom: 28px;
            font-weight: 500;
        }
        #game-over-overlay button {
            pointer-events: auto;
            padding: clamp(12px, 2.5vh, 16px) clamp(36px, 8vw, 56px);
            font-size: clamp(16px, 2.8vw, 22px);
            font-weight: 700;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6b7f, #ff3d55);
            color: #fff;
            letter-spacing: 0.04em;
            box-shadow: 0 8px 30px rgba(255, 60, 80, 0.45);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }
        #game-over-overlay button:hover {
            transform: scale(1.06);
            box-shadow: 0 12px 36px rgba(255, 60, 80, 0.6);
        }
        #game-over-overlay button:active {
            transform: scale(0.95);
            transition: transform 0.08s ease;
        }

        #mobile-controls {
            position: absolute;
            bottom: calc(var(--safe-bottom) + 10px);
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 clamp(16px, 5vw, 40px);
            pointer-events: auto;
            z-index: 25;
        }
        .ctrl-btn {
            width: clamp(64px, 16vw, 90px);
            height: clamp(64px, 16vw, 90px);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: clamp(26px, 6vw, 40px);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s ease, transform 0.1s ease;
            -webkit-tap-highlight-color: transparent;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .ctrl-btn:active {
            background: rgba(255, 255, 255, 0.35);
            transform: scale(0.88);
            transition: transform 0.06s ease;
        }
        .ctrl-btn.left-btn {
            margin-right: auto;
        }
        .ctrl-btn.right-btn {
            margin-left: auto;
        }

        @media (min-width: 769px) {
            #mobile-controls {
                display: none;
            }
        }
        @media (max-width: 768px) {
            #mobile-controls {
                display: flex;
            }
        }

        #instructions {
            position: absolute;
            bottom: calc(var(--safe-bottom) + 100px);
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(12px, 2vw, 15px);
            pointer-events: none;
            z-index: 15;
            text-align: center;
            letter-spacing: 0.03em;
            transition: opacity 0.6s ease;
        }
        @media (max-width: 768px) {
            #instructions {
                bottom: calc(var(--safe-bottom) + 140px);
            }
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="ui-layer">
        <div id="score-display">0</div>
        <div id="combo-text"></div>
        <div id="game-over-overlay">
            <h2>游戏结束</h2>
            <div class="final-score" id="final-score">得分: 0</div>
            <div class="best-score" id="best-score">最高分: 0</div>
            <button id="restart-btn">重新开始</button>
        </div>
        <div id="mobile-controls">
            <div class="ctrl-btn left-btn" id="btn-left">◀</div>
            <div class="ctrl-btn right-btn" id="btn-right">▶</div>
        </div>
        <div id="instructions">⌨ 方向键 / A D 切换跑道 &nbsp;|&nbsp; 📱 点击左右半屏切换</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ──────────────────────────────────────────────
        // 检测移动端
        // ──────────────────────────────────────────────
        const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
            (window.innerWidth <= 768 && 'ontouchstart' in window);

        // ──────────────────────────────────────────────
        // DOM 元素
        // ──────────────────────────────────────────────
        const container = document.getElementById('game-container');
        const scoreDisplay = document.getElementById('score-display');
        const comboText = document.getElementById('combo-text');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const finalScoreEl = document.getElementById('final-score');
        const bestScoreEl = document.getElementById('best-score');
        const restartBtn = document.getElementById('restart-btn');
        const instructionsEl = document.getElementById('instructions');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');

        // ──────────────────────────────────────────────
        // Three.js 初始化
        // ──────────────────────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: !isMobile, alpha: false });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, isMobile ? 2 : 2.5));
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = !isMobile;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.1;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#1a1a3a');
        scene.fog = new THREE.Fog('#1a1a3a', 25, 70);

        const camera = new THREE.PerspectiveCamera(
            isMobile ? 72 : 65,
            window.innerWidth / window.innerHeight,
            0.5,
            120
        );
        camera.position.set(0, 6.5, 10);
        camera.lookAt(0, 0, -8);

        // ──────────────────────────────────────────────
        // 光照
        // ──────────────────────────────────────────────
        const ambientLight = new THREE.AmbientLight('#8899cc', 1.8);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight('#ffffff', 3.5);
        sunLight.position.set(8, 18, 5);
        sunLight.castShadow = !isMobile;
        if (!isMobile) {
            sunLight.shadow.mapSize.width = 1024;
            sunLight.shadow.mapSize.height = 1024;
            sunLight.shadow.camera.near = 0.5;
            sunLight.shadow.camera.far = 80;
            sunLight.shadow.camera.left = -20;
            sunLight.shadow.camera.right = 20;
            sunLight.shadow.camera.top = 30;
            sunLight.shadow.camera.bottom = -5;
            sunLight.shadow.bias = -0.0003;
        }
        scene.add(sunLight);

        const rimLight = new THREE.DirectionalLight('#ff8866', 1.2);
        rimLight.position.set(-4, 3, -6);
        scene.add(rimLight);

        const fillLight = new THREE.DirectionalLight('#6699ff', 0.8);
        fillLight.position.set(0, 2, 12);
        scene.add(fillLight);

        // ──────────────────────────────────────────────
        // 跑道参数
        // ──────────────────────────────────────────────
        const LANE_POSITIONS = [-2.2, 0, 2.2];
        const LANE_COUNT = 3;
        const ROAD_WIDTH = 7.5;
        const ROAD_LENGTH = 80;
        const LANE_MARKER_SPACING = 3.5;
        const LANE_MARKER_LENGTH = 1.6;
        const LANE_MARKER_WIDTH = 0.18;

        // ──────────────────────────────────────────────
        // 道路构建
        // ──────────────────────────────────────────────
        const roadGroup = new THREE.Group();
        scene.add(roadGroup);

        // 主路面
        const roadGeo = new THREE.PlaneGeometry(ROAD_WIDTH, ROAD_LENGTH);
        const roadMat = new THREE.MeshStandardMaterial({
            color: '#3a3a4a',
            roughness: 0.55,
            metalness: 0.15,
        });
        const roadMesh = new THREE.Mesh(roadGeo, roadMat);
        roadMesh.rotation.x = -Math.PI / 2;
        roadMesh.position.set(0, -0.05, -ROAD_LENGTH / 2 + 15);
        roadMesh.receiveShadow = true;
        roadGroup.add(roadMesh);

        // 路肩
        const shoulderGeo = new THREE.PlaneGeometry(2.5, ROAD_LENGTH);
        const shoulderMat = new THREE.MeshStandardMaterial({
            color: '#555560',
            roughness: 0.7,
            metalness: 0.05,
        });
        [-1, 1].forEach(side => {
            const shoulder = new THREE.Mesh(shoulderGeo, shoulderMat);
            shoulder.rotation.x = -Math.PI / 2;
            shoulder.position.set(side * (ROAD_WIDTH / 2 + 1.25), -0.08, -ROAD_LENGTH / 2 + 15);
            shoulder.receiveShadow = true;
            roadGroup.add(shoulder);
        });

        // 跑道分隔线标记（对象池式的循环线段）
        const laneMarkers = [];
        const markerGeo = new THREE.BoxGeometry(LANE_MARKER_WIDTH, 0.04, LANE_MARKER_LENGTH);
        const markerMat = new THREE.MeshStandardMaterial({
            color: '#ffffff',
            roughness: 0.3,
            metalness: 0.1,
            emissive: '#ffffff',
            emissiveIntensity: 0.5,
        });
        const markerSeparations = [-1.1, 1.1]; // 两条分隔线的x位置
        const markersPerLine = Math.ceil(ROAD_LENGTH / LANE_MARKER_SPACING) + 6;

        markerSeparations.forEach(sepX => {
            for (let i = 0; i < markersPerLine; i++) {
                const marker = new THREE.Mesh(markerGeo, markerMat);
                marker.position.set(sepX, 0.01, -ROAD_LENGTH / 2 + 10 + i * LANE_MARKER_SPACING);
                marker.castShadow = false;
                marker.receiveShadow = true;
                marker.userData = {
                    sepX: sepX,
                    baseZ: marker.position.z,
                    index: i,
                };
                roadGroup.add(marker);
                laneMarkers.push(marker);
            }
        });

        // ──────────────────────────────────────────────
        // 道路两侧装饰（树/柱子）
        // ──────────────────────────────────────────────
        const decorations = [];
        const decorCount = isMobile ? 28 : 40;
        const decorSpacing = ROAD_LENGTH / decorCount;

        function createTree(x, z) {
            const group = new THREE.Group();
            const trunkGeo = new THREE.CylinderGeometry(0.15, 0.2, 1.8, 6);
            const trunkMat = new THREE.MeshStandardMaterial({ color: '#8B6914', roughness: 0.8 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 0.9;
            trunk.castShadow = !isMobile;
            group.add(trunk);

            const foliageGeo = new THREE.ConeGeometry(0.7, 2.2, 7);
            const foliageMat = new THREE.MeshStandardMaterial({ color: '#2d8a4e', roughness: 0.6 });
            const foliage = new THREE.Mesh(foliageGeo, foliageMat);
            foliage.position.y = 2.4;
            foliage.castShadow = !isMobile;
            group.add(foliage);

            const foliage2Geo = new THREE.ConeGeometry(0.5, 1.6, 7);
            const foliage2 = new THREE.Mesh(foliage2Geo, foliageMat);
            foliage2.position.y = 3.6;
            foliage2.castShadow = !isMobile;
            group.add(foliage2);

            group.position.set(x, 0, z);
            return group;
        }

        for (let i = 0; i < decorCount; i++) {
            const z = -ROAD_LENGTH / 2 + 8 + i * decorSpacing;
            const leftTree = createTree(-ROAD_WIDTH / 2 - 1.6, z);
            const rightTree = createTree(ROAD_WIDTH / 2 + 1.6, z);
            roadGroup.add(leftTree);
            roadGroup.add(rightTree);
            decorations.push({ left: leftTree, right: rightTree, baseZ: z });
        }

        // ──────────────────────────────────────────────
        // 地面
        // ──────────────────────────────────────────────
        const groundGeo = new THREE.PlaneGeometry(60, ROAD_LENGTH + 20);
        const groundMat = new THREE.MeshStandardMaterial({
            color: '#1a3a1a',
            roughness: 0.9,
            metalness: 0,
        });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.set(0, -0.2, -ROAD_LENGTH / 2 + 15);
        ground.receiveShadow = true;
        scene.add(ground);

        // ──────────────────────────────────────────────
        // 玩家
        // ──────────────────────────────────────────────
        const playerGroup = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(0.65, 0.9, 0.45, 2, 2, 2);
        const bodyMat = new THREE.MeshStandardMaterial({
            color: '#00ccff',
            roughness: 0.2,
            metalness: 0.5,
            emissive: '#004466',
            emissiveIntensity: 0.4,
        });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.55;
        body.castShadow = true;
        playerGroup.add(body);

        const headGeo = new THREE.SphereGeometry(0.3, 12, 10);
        const headMat = new THREE.MeshStandardMaterial({
            color: '#ffeedd',
            roughness: 0.3,
            metalness: 0.1,
        });
        const head = new THREE.Mesh(headGeo, headMat);
        head.position.y = 1.2;
        head.castShadow = true;
        playerGroup.add(head);

        // 护目镜
        const goggleGeo = new THREE.BoxGeometry(0.36, 0.14, 0.12);
        const goggleMat = new THREE.MeshStandardMaterial({
            color: '#111133',
            roughness: 0.1,
            metalness: 0.9,
            emissive: '#000022',
            emissiveIntensity: 0.3,
        });
        const goggles = new THREE.Mesh(goggleGeo, goggleMat);
        goggles.position.set(0, 1.24, 0.28);
        playerGroup.add(goggles);

        // 发光环
        const ringGeo = new THREE.TorusGeometry(0.38, 0.06, 8, 16);
        const ringMat = new THREE.MeshStandardMaterial({
            color: '#00eeff',
            roughness: 0.15,
            metalness: 0.7,
            emissive: '#00ccff',
            emissiveIntensity: 1.5,
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.position.y = 0.5;
        ring.rotation.x = Math.PI / 2;
        playerGroup.add(ring);

        playerGroup.position.set(LANE_POSITIONS[1], 0, 0);
        scene.add(playerGroup);

        // ──────────────────────────────────────────────
        // 对象池：障碍物
        // ──────────────────────────────────────────────
        const obstaclePool = [];
        const OBSTACLE_POOL_SIZE = isMobile ? 18 : 24;
        const obstacleTypes = [
            { geo: new THREE.BoxGeometry(0.7, 0.9, 0.5), color: '#ff3355', emissive: '#330000' },
            { geo: new THREE.CylinderGeometry(0.35, 0.4, 1.0, 8), color: '#ff5522', emissive: '#331100' },
            { geo: new THREE.BoxGeometry(0.8, 1.15, 0.55), color: '#ee2244', emissive: '#220000' },
            { geo: new THREE.ConeGeometry(0.38, 0.9, 6), color: '#ff4411', emissive: '#331100' },
        ];

        for (let i = 0; i < OBSTACLE_POOL_SIZE; i++) {
            const typeIdx = i % obstacleTypes.length;
            const type = obstacleTypes[typeIdx];
            const geo = type.geo;
            const mat = new THREE.MeshStandardMaterial({
                color: type.color,
                roughness: 0.25,
                metalness: 0.4,
                emissive: type.emissive,
                emissiveIntensity: 0.6,
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.visible = false;
            mesh.userData = {
                active: false,
                lane: 0,
                speed: 0,
            };
            scene.add(mesh);
            obstaclePool.push(mesh);
        }

        // ──────────────────────────────────────────────
        // 对象池：金币
        // ──────────────────────────────────────────────
        const coinPool = [];
        const COIN_POOL_SIZE = isMobile ? 22 : 30;
        const coinGeo = new THREE.TorusGeometry(0.28, 0.1, 8, 12);

        for (let i = 0; i < COIN_POOL_SIZE; i++) {
            const mat = new THREE.MeshStandardMaterial({
                color: '#ffd700',
                roughness: 0.15,
                metalness: 0.9,
                emissive: '#886600',
                emissiveIntensity: 0.7,
            });
            const mesh = new THREE.Mesh(coinGeo, mat);
            mesh.castShadow = false;
            mesh.receiveShadow = false;
            mesh.visible = false;
            mesh.userData = {
                active: false,
                lane: 0,
                speed: 0,
                rotationSpeed: 2.5 + Math.random() * 3,
            };
            scene.add(mesh);
            coinPool.push(mesh);
        }

        // ──────────────────────────────────────────────
        // 粒子池（收集金币时的特效）
        // ──────────────────────────────────────────────
        const particlePool = [];
        const PARTICLE_POOL_SIZE = isMobile ? 40 : 60;
        const particleGeo = new THREE.SphereGeometry(0.08, 4, 4);

        for (let i = 0; i < PARTICLE_POOL_SIZE; i++) {
            const mat = new THREE.MeshBasicMaterial({
                color: '#ffdd44',
                transparent: true,
                opacity: 1,
            });
            const mesh = new THREE.Mesh(particleGeo, mat);
            mesh.visible = false;
            mesh.userData = {
                active: false,
                life: 0,
                maxLife: 0,
                velocity: new THREE.Vector3(),
            };
            scene.add(mesh);
            particlePool.push(mesh);
        }

        // ──────────────────────────────────────────────
        // 音效系统 (Web Audio API 简易音效)
        // ──────────────────────────────────────────────
        let audioCtx = null;

        function getAudioContext() {
            if (!audioCtx) {
                try {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                } catch (e) {
                    audioCtx = null;
                }
            }
            return audioCtx;
        }

        function playBeep(freq, duration, type = 'square', vol = 0.06) {
            const ctx = getAudioContext();
            if (!ctx) return;
            try {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(freq * 0.4, ctx.currentTime + duration);
                gain.gain.setValueAtTime(vol, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
            } catch (e) { /* 静默处理 */ }
        }

        function sfxCoin() { playBeep(880, 0.1, 'square', 0.05);
            playBeep(1200, 0.07, 'sine', 0.04); }

        function sfxHit() { playBeep(60, 0.25, 'sawtooth', 0.08);
            playBeep(40, 0.3, 'triangle', 0.06); }

        function sfxSwitch() { playBeep(300, 0.06, 'sine', 0.03); }

        // ──────────────────────────────────────────────
        // 游戏状态
        // ──────────────────────────────────────────────
        const state = {
            gameRunning: true,
            score: 0,
            bestScore: 0,
            playerLane: 1, // 0=左, 1=中, 2=右
            targetLaneX: LANE_POSITIONS[1],
            currentSpeed: 16,
            baseSpeed: 16,
            maxSpeed: 42,
            speedIncrement: 0.35,
            obstacleTimer: 0,
            obstacleInterval: 1.3,
            minObstacleInterval: 0.45,
            coinTimer: 0,
            coinInterval: 0.7,
            comboCount: 0,
            comboTimer: 0,
            difficultyLevel: 1,
            timeSinceLastObstacle: 0,
        };

        function loadBestScore() {
            try {
                const saved = localStorage.getItem('runner3d_bestscore');
                return saved ? parseInt(saved, 10) : 0;
            } catch (e) { return 0; }
        }

        function saveBestScore(score) {
            try {
                localStorage.setItem('runner3d_bestscore', score.toString());
            } catch (e) { /* 静默 */ }
        }

        state.bestScore = loadBestScore();
        bestScoreEl.textContent = `最高分: ${state.bestScore}`;

        // ──────────────────────────────────────────────
        // 辅助函数
        // ──────────────────────────────────────────────
        function getPoolItem(pool) {
            for (const item of pool) {
                if (!item.userData.active && !item.visible) return item;
            }
            return null;
        }

        function spawnObstacle() {
            const obs = getPoolItem(obstaclePool);
            if (!obs) return;

            const lane = Math.floor(Math.random() * LANE_COUNT);
            const x = LANE_POSITIONS[lane];
            const z = -32 - Math.random() * 10;
            obs.position.set(x, 0.45, z);
            obs.visible = true;
            obs.userData.active = true;
            obs.userData.lane = lane;
            obs.userData.speed = state.currentSpeed;
            obs.rotation.set(0, 0, 0);
        }

        function spawnCoin() {
            const coin = getPoolItem(coinPool);
            if (!coin) return;

            const lane = Math.floor(Math.random() * LANE_COUNT);
            const x = LANE_POSITIONS[lane];
            const z = -30 - Math.random() * 14;
            coin.position.set(x, 1.0 + Math.random() * 0.6, z);
            coin.rotation.set(0, Math.random() * Math.PI * 2, Math.PI / 2);
            coin.visible = true;
            coin.userData.active = true;
            coin.userData.lane = lane;
            coin.userData.speed = state.currentSpeed;
            coin.userData.rotationSpeed = 2.5 + Math.random() * 3.5;
        }

        function spawnParticles(position, count = 8) {
            let spawned = 0;
            for (const particle of particlePool) {
                if (spawned >= count) break;
                if (!particle.userData.active && !particle.visible) {
                    particle.position.copy(position);
                    particle.position.x += (Math.random() - 0.5) * 0.8;
                    particle.position.y += Math.random() * 0.6;
                    particle.position.z += (Math.random() - 0.5) * 0.8;
                    particle.visible = true;
                    particle.userData.active = true;
                    particle.userData.life = 0.5 + Math.random() * 0.6;
                    particle.userData.maxLife = particle.userData.life;
                    particle.userData.velocity.set(
                        (Math.random() - 0.5) * 3,
                        1.5 + Math.random() * 4,
                        (Math.random() - 0.5) * 3
                    );
                    particle.material.opacity = 1;
                    particle.scale.setScalar(0.7 + Math.random() * 0.6);
                    spawned++;
                }
            }
        }

        function resetGame() {
            // 回收所有障碍物
            obstaclePool.forEach(obs => {
                obs.visible = false;
                obs.userData.active = false;
            });
            // 回收所有金币
            coinPool.forEach(coin => {
                coin.visible = false;
                coin.userData.active = false;
            });
            // 回收所有粒子
            particlePool.forEach(p => {
                p.visible = false;
                p.userData.active = false;
            });
            // 重置状态
            state.gameRunning = true;
            state.score = 0;
            state.playerLane = 1;
            state.targetLaneX = LANE_POSITIONS[1];
            state.currentSpeed = state.baseSpeed;
            state.obstacleTimer = 0;
            state.obstacleInterval = 1.3;
            state.coinTimer = 0;
            state.comboCount = 0;
            state.comboTimer = 0;
            state.difficultyLevel = 1;
            state.timeSinceLastObstacle = 0;
            playerGroup.position.x = LANE_POSITIONS[1];
            playerGroup.position.y = 0;
            playerGroup.rotation.set(0, 0, 0);
            playerGroup.scale.setScalar(1);
            scoreDisplay.textContent = '0';
            scoreDisplay.classList.remove('pulse');
            comboText.classList.remove('show');
            gameOverOverlay.classList.remove('active');
            instructionsEl.style.opacity = '1';
            bodyMat.color.set('#00ccff');
            bodyMat.emissive.set('#004466');
            ringMat.emissiveIntensity = 1.5;
        }

        function endGame() {
            if (!state.gameRunning) return;
            state.gameRunning = false;
            sfxHit();

            // 玩家弹起动画
            playerGroup.userData.deathAnimTime = 0.5;

            if (state.score > state.bestScore) {
                state.bestScore = state.score;
                saveBestScore(state.bestScore);
            }
            finalScoreEl.textContent = `得分: ${Math.floor(state.score)}`;
            bestScoreEl.textContent = `最高分: ${state.bestScore}`;
            gameOverOverlay.classList.add('active');
            instructionsEl.style.opacity = '0';
            bodyMat.color.set('#ff3344');
            bodyMat.emissive.set('#330000');
            ringMat.emissiveIntensity = 0.3;
        }

        function movePlayer(direction) {
            if (!state.gameRunning) return;
            const newLane = state.playerLane + direction;
            if (newLane < 0 || newLane >= LANE_COUNT) return;
            state.playerLane = newLane;
            state.targetLaneX = LANE_POSITIONS[newLane];
            sfxSwitch();
        }

        // ──────────────────────────────────────────────
        // 输入处理
        // ──────────────────────────────────────────────
        const keysPressed = {};
        let keyHandledThisFrame = false;

        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                e.preventDefault();
                if (!keysPressed['left']) {
                    keysPressed['left'] = true;
                    movePlayer(-1);
                }
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                e.preventDefault();
                if (!keysPressed['right']) {
                    keysPressed['right'] = true;
                    movePlayer(1);
                }
            }
            if (e.key === ' ' || e.key === 'Enter') {
                e.preventDefault();
                if (!state.gameRunning) {
                    resetGame();
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                keysPressed['left'] = false;
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                keysPressed['right'] = false;
            }
        });

        // 触摸/点击处理
        let touchStartX = 0;
        let touchStartY = 0;
        let touchStartTime = 0;

        renderer.domElement.addEventListener('touchstart', (e) => {
            if (!state.gameRunning) {
                resetGame();
                return;
            }
            if (e.touches.length === 1) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                touchStartTime = Date.now();
            }
        }, { passive: true });

        renderer.domElement.addEventListener('touchend', (e) => {
            if (!state.gameRunning) return;
            const dx = (e.changedTouches[0]?.clientX || touchStartX) - touchStartX;
            const dy = (e.changedTouches[0]?.clientY || touchStartY) - touchStartY;
            const dt = Date.now() - touchStartTime;
            const absDx = Math.abs(dx);
            const absDy = Math.abs(dy);

            // 判断是否为滑动（水平滑动且距离足够）
            if (absDx > 25 && absDx > absDy * 1.2 && dt < 500) {
                if (dx < -20) movePlayer(-1);
                else if (dx > 20) movePlayer(1);
            } else if (absDx < 20 && absDy < 20 && dt < 300) {
                // 点击：屏幕左半=左移，右半=右移
                const midX = window.innerWidth / 2;
                if (touchStartX < midX) movePlayer(-1);
                else movePlayer(1);
            }
        });

        renderer.domElement.addEventListener('click', (e) => {
            if (!state.gameRunning) {
                resetGame();
                return;
            }
            // 桌面端点击切换（仅当没有触发touch事件时）
            if (!('ontouchstart' in window) && isMobile === false) {
                const midX = window.innerWidth / 2;
                if (e.clientX < midX) movePlayer(-1);
                else movePlayer(1);
            }
        });

        // 移动端按钮
        btnLeft.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            movePlayer(-1);
        });
        btnRight.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            movePlayer(1);
        });
        btnLeft.addEventListener('touchstart', (e) => { e.stopPropagation();
            e.preventDefault();
            movePlayer(-1); });
        btnRight.addEventListener('touchstart', (e) => { e.stopPropagation();
            e.preventDefault();
            movePlayer(1); });

        // 重新开始按钮
        restartBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            resetGame();
        });
        restartBtn.addEventListener('pointerdown', (e) => {
            e.stopPropagation();
            e.preventDefault();
            resetGame();
        });

        // ──────────────────────────────────────────────
        // 窗口大小调整
        // ──────────────────────────────────────────────
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.fov = isMobile ? 72 : 65;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ──────────────────────────────────────────────
        // 页面可见性处理
        // ──────────────────────────────────────────────
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 暂停时不做特殊处理，游戏循环会自然暂停
            }
        });

        // ──────────────────────────────────────────────
        // 游戏循环
        // ──────────────────────────────────────────────
        const clock = new THREE.Clock();
        let lastFpsCheck = performance.now();
        let frameCount = 0;
        let currentFps = 60;

        function animate(timestamp) {
            requestAnimationFrame(animate);

            const rawDt = clock.getDelta();
            const dt = Math.min(rawDt, 0.15); // 防止大帧跳跃

            // FPS监控
            frameCount++;
            if (timestamp - lastFpsCheck >= 1000) {
                currentFps = Math.round(frameCount / ((timestamp - lastFpsCheck) / 1000));
                frameCount = 0;
                lastFpsCheck = timestamp;
            }

            if (state.gameRunning) {
                // 难度递增
                state.difficultyLevel = 1 + Math.floor(state.score / 80);
                state.currentSpeed = Math.min(
                    state.maxSpeed,
                    state.baseSpeed + state.difficultyLevel * state.speedIncrement
                );
                state.obstacleInterval = Math.max(
                    state.minObstacleInterval,
                    1.3 - state.difficultyLevel * 0.06
                );
                state.coinInterval = Math.max(0.35, 0.7 - state.difficultyLevel * 0.02);

                // 分数增长
                state.score += state.currentSpeed * dt * 0.6;
                scoreDisplay.textContent = Math.floor(state.score).toString();

                // 连击计时器
                if (state.comboTimer > 0) {
                    state.comboTimer -= dt;
                    if (state.comboTimer <= 0) {
                        state.comboCount = 0;
                        comboText.classList.remove('show');
                    }
                }

                // 生成障碍物
                state.obstacleTimer += dt;
                state.timeSinceLastObstacle += dt;
                if (state.obstacleTimer >= state.obstacleInterval) {
                    state.obstacleTimer = 0;
                    state.timeSinceLastObstacle = 0;
                    // 有时同时生成两个障碍物
                    const spawnCount = (state.difficultyLevel >= 4 && Math.random() < 0.35) ? 2 : 1;
                    for (let i = 0; i < spawnCount; i++) {
                        spawnObstacle();
                    }
                }

                // 生成金币
                state.coinTimer += dt;
                if (state.coinTimer >= state.coinInterval) {
                    state.coinTimer = 0;
                    if (Math.random() < 0.75) {
                        spawnCoin();
                        if (Math.random() < 0.3) spawnCoin(); // 偶尔双金币
                    }
                }

                // 更新障碍物
                const obstacleRecycleZ = 8;
                for (const obs of obstaclePool) {
                    if (!obs.userData.active || !obs.visible) continue;
                    obs.position.z += state.currentSpeed * dt;
                    // 轻微旋转增加动感
                    obs.rotation.y += dt * 1.5;
                    obs.rotation.x += dt * 0.7;
                    if (obs.position.z > obstacleRecycleZ) {
                        obs.visible = false;
                        obs.userData.active = false;
                        obs.position.z = -40;
                    }
                }

                // 更新金币
                const coinRecycleZ = 8;
                for (const coin of coinPool) {
                    if (!coin.userData.active || !coin.visible) continue;
                    coin.position.z += state.currentSpeed * dt;
                    coin.rotation.z += coin.userData.rotationSpeed * dt;
                    if (coin.position.z > coinRecycleZ) {
                        coin.visible = false;
                        coin.userData.active = false;
                        coin.position.z = -40;
                    }
                }

                // 碰撞检测：障碍物
                const playerZ = playerGroup.position.z;
                const collisionToleranceZ = 0.7;
                const collisionToleranceX = 0.9;
                for (const obs of obstaclePool) {
                    if (!obs.userData.active || !obs.visible) continue;
                    const obsZ = obs.position.z;
                    if (Math.abs(obsZ - playerZ) < collisionToleranceZ) {
                        const playerX = playerGroup.position.x;
                        const obsX = LANE_POSITIONS[obs.userData.lane];
                        if (Math.abs(playerX - obsX) < collisionToleranceX) {
                            endGame();
                            break;
                        }
                    }
                }

                // 碰撞检测：金币收集
                const coinCollectToleranceZ = 0.8;
                const coinCollectToleranceX = 1.0;
                for (const coin of coinPool) {
                    if (!coin.userData.active || !coin.visible) continue;
                    const coinZ = coin.position.z;
                    if (Math.abs(coinZ - playerZ) < coinCollectToleranceZ) {
                        const playerX = playerGroup.position.x;
                        const coinX = LANE_POSITIONS[coin.userData.lane];
                        if (Math.abs(playerX - coinX) < coinCollectToleranceX) {
                            // 收集金币
                            coin.visible = false;
                            coin.userData.active = false;
                            state.score += 10 + state.difficultyLevel * 2;
                            state.comboCount++;
                            state.comboTimer = 1.2;
                            sfxCoin();
                            spawnParticles(coin.position, 6 + Math.min(state.comboCount, 12));
                            // 显示连击
                            if (state.comboCount >= 3) {
                                comboText.textContent =
                                    state.comboCount >= 10 ? `🔥 x${state.comboCount} 完美!` :
                                    state.comboCount >= 6 ? `✨ x${state.comboCount}` :
                                    `x${state.comboCount}`;
                                comboText.classList.remove('show');
                                void comboText.offsetWidth;
                                comboText.classList.add('show');
                            }
                            // 分数脉冲
                            scoreDisplay.classList.add('pulse');
                            setTimeout(() => scoreDisplay.classList.remove('pulse'), 150);
                        }
                    }
                }

                // 玩家平滑移动到目标跑道
                const lerpSpeed = 12;
                const currentX = playerGroup.position.x;
                const newX = currentX + (state.targetLaneX - currentX) * Math.min(lerpSpeed * dt, 1);
                playerGroup.position.x = newX;

                // 玩家微小的上下浮动
                playerGroup.position.y = Math.sin(timestamp * 0.008) * 0.12;
                // 环形装饰旋转
                ring.rotation.z += dt * 3;
                ring.rotation.y += dt * 1.5;

                // 更新道路标线（循环移动）
                for (const marker of laneMarkers) {
                    marker.position.z += state.currentSpeed * dt;
                    if (marker.position.z > 8) {
                        marker.position.z -= ROAD_LENGTH;
                    }
                }

                // 更新装饰物（循环移动）
                for (const decor of decorations) {
                    decor.left.position.z += state.currentSpeed * dt;
                    decor.right.position.z += state.currentSpeed * dt;
                    if (decor.left.position.z > 10) {
                        decor.left.position.z -= ROAD_LENGTH;
                        decor.right.position.z -= ROAD_LENGTH;
                    }
                }
            } else {
                // 游戏结束动画
                if (playerGroup.userData.deathAnimTime > 0) {
                    playerGroup.userData.deathAnimTime -= dt;
                    const t = playerGroup.userData.deathAnimTime;
                    playerGroup.position.y = Math.max(0, t * 4);
                    playerGroup.rotation.x = Math.min((0.5 - t) * 8, Math.PI / 3);
                    if (playerGroup.userData.deathAnimTime <= 0) {
                        playerGroup.position.y = 0;
                        playerGroup.rotation.x = 0;
                    }
                }
            }

            // 更新粒子
            for (const particle of particlePool) {
                if (!particle.userData.active || !particle.visible) continue;
                particle.userData.life -= dt;
                if (particle.userData.life <= 0) {
                    particle.visible = false;
                    particle.userData.active = false;
                } else {
                    const progress = 1 - particle.userData.life / particle.userData.maxLife;
                    particle.position.x += particle.userData.velocity.x * dt;
                    particle.position.y += particle.userData.velocity.y * dt;
                    particle.position.z += particle.userData.velocity.z * dt;
                    particle.userData.velocity.y += dt * 2; // 重力
                    particle.material.opacity = 1 - progress;
                    particle.scale.setScalar(particle.scale.x * (1 - dt * 1.5));
                }
            }

            // 相机微微晃动
            if (state.gameRunning) {
                const camTargetX = playerGroup.position.x * 0.25;
                camera.position.x += (camTargetX - camera.position.x) * dt * 3;
                camera.position.y += (6.5 + Math.sin(timestamp * 0.005) * 0.3 - camera.position.y) * dt * 2;
            }

            // 渲染
            renderer.render(scene, camera);
        }

        // ──────────────────────────────────────────────
        // 启动
        // ──────────────────────────────────────────────
        playerGroup.userData = { deathAnimTime: 0 };
        resetGame();
        gameOverOverlay.classList.remove('active');
        instructionsEl.style.opacity = '1';
        requestAnimationFrame(animate);

        // ──────────────────────────────────────────────
        // 性能信息（开发时可查看，正式环境隐藏）
        // ──────────────────────────────────────────────
        if (false) { // 设为true可查看FPS
            const fpsEl = document.createElement('div');
            fpsEl.style.cssText =
                'position:fixed;top:10px;right:10px;color:#0f0;font-size:14px;z-index:99;pointer-events:none;font-family:monospace;';
            document.body.appendChild(fpsEl);
            setInterval(() => {
                fpsEl.textContent = `FPS: ${currentFps} | Speed: ${state.currentSpeed.toFixed(1)} | Diff: ${state.difficultyLevel}`;
            }, 300);
        }

        console.log('🏃 3D极速跑酷已就绪');
        console.log('   PC: 方向键/A D 切换跑道');
        console.log('   手机: 左右滑动或点击屏幕左右半区');
        console.log(`   目标帧率: ≥30fps | 当前设备: ${isMobile ? '移动端' : '桌面端'}`);
    </script>
</body>
</html>
